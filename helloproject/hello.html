<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello, Rakesh!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f4ff;
    }

    h1 {
      font-size: 64px;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    p {
      font-size: 24px;
      color: #555;
      margin-bottom: 40px;
    }

    button {
      font-size: 20px;
      padding: 14px 36px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #4338ca;
    }
  </style>
</head>
<body>

  <h1>Rakesh Verma</h1>
  <p id="date"></p>
  <button onclick="alert('Welcome, Rakesh! 🎉')">Welcome</button>

  <script>
    const today = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('date').textContent = today.toLocaleDateString('en-US', options);
  </script>

</body>
</html>
